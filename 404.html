<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina nao encontrada — Armando Netto</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:     #f0eee6;
            --text:   #1f1e1d;
            --muted:  #3a3936;
            --border: #d1cfc5;
            --accent: #4a67b5;
        }
        html.dark {
            --bg:     #1f1e1d;
            --text:   #f0eee6;
            --muted:  #87867f;
            --border: #3d3d3a;
            --accent: #6b85c4;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Newsreader', Georgia, 'Times New Roman', serif;
            font-size: 16px;
            line-height: 1.6;
            transition: background-color 0.2s, color 0.2s;
        }
        a { color: inherit; text-decoration: none; }
        .container {
            max-width: 640px;
            margin: 0 auto;
            padding: 3.5rem 1.5rem 6rem;
        }
        .pf-name {
            font-size: 1.05rem;
            font-weight: 500;
            color: var(--accent);
            letter-spacing: -0.01em;
            line-height: 1;
            transition: color 0.15s;
        }
        .pf-name:hover { color: var(--muted); }
        .pf-404 {
            margin-top: 4rem;
        }
        .pf-404-codigo {
            font-size: 4rem;
            font-weight: 300;
            color: var(--accent);
            line-height: 1;
            margin-bottom: 1rem;
        }
        .pf-404-titulo {
            font-size: 1.2rem;
            font-weight: 400;
            color: var(--text);
            margin-bottom: 0.6rem;
        }
        .pf-404-desc {
            font-size: 0.95rem;
            font-weight: 300;
            color: var(--muted);
            margin-bottom: 2rem;
        }
        .pf-404-link {
            font-size: 0.9rem;
            font-weight: 400;
            color: var(--accent);
            border-bottom: 1px solid var(--accent);
            transition: color 0.15s;
        }
        .pf-404-link:hover { color: var(--muted); }
    </style>
</head>
<body>
<div class="container">
    <a href="/" class="pf-name">Armando Netto</a>
    <div class="pf-404">
        <div class="pf-404-codigo">404</div>
        <div class="pf-404-titulo">Pagina nao encontrada</div>
        <div class="pf-404-desc">O endereco que voce tentou acessar nao existe ou foi removido.</div>
        <a href="/" class="pf-404-link">Voltar para o inicio</a>
    </div>
</div>
<script>
    const isDark = localStorage.getItem('dark') === '1';
    if (isDark) document.documentElement.classList.add('dark');
</script>
</body>
</html>
